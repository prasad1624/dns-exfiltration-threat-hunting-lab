index=main sourcetype=zeek:dns host=ubuntuone
| stats earliest(_time) as first_seen, count by query
| where first_seen > relative_time(max(_time), "-1h")
| where count > 20
| where NOT (query IN ("google.com", "ubuntu.com", "connectivity-check.ubuntu.com"))
| eval severity = "MEDIUM"
| eval description = "New domain with high query volume: " . query
| table query, first_seen, count, severity, description